# what is goal of your workflow
# Goal: whenever someone will change your python code 
# then linter will check the syntax , format , intentation is correct or not

name: Auto Linter

on:
  push:
    paths: "*.py"

jobs:
  code-linting:
    runs-on: ubuntu-latest

    #this steps will automatically clone the code of the current branch into runner
    steps:
      - name: Checkout/clone the code  
        run: actions/checkout@v7

      - name: Install Linter
        run: pip install ruff

      - name: check the code of the file
        run: ruff check .

        
