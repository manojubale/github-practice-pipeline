# what is goal of your workflow
# Goal: whenever someone will change your python code 
# then linter will check the syntax , format , intentation is correct or not

name: Auto Linter

on:
  push:
    paths: "*.py"

jobs:
  code-linting:
    runs-on: ubuntu-latest

    #this steps will automatically clone the code of the current branch into runner
    steps:
      - name: Checkout/clone the code  
        uses: actions/checkout@v7
      
        #Install and configure Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14' # Specify your exact required version

        #Verify the installation and use Python
      - name: Display Python version
        run: python --version

      - name: Set up Docker CE
        uses: docker/setup-docker-action@v4
        with:
          version: 'latest'  # Omit or set to a specific version like '26.1.4'
          rootless: false    # Set to true if you need to run rootless daemon

      - name: Verify Docker installation
        run: |
          docker version
          docker info

      - name: Install Linter
        run: pip install ruff

      - name: check the code of the file
        run: ruff check .

        
